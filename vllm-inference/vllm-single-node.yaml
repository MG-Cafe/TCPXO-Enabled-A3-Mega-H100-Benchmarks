# vLLM Single-Node Inference on A3 Mega (H100)
# Uses NCCL_NET_PLUGIN to bypass TCPXO shim (version mismatch with bundled NCCL)
apiVersion: v1
kind: Service
metadata:
  name: vllm-service
spec:
  selector:
    app: vllm
  clusterIP: None
  ports:
    - name: vllm-api
      port: 8000
---
apiVersion: v1
kind: Pod
metadata:
  name: vllm-inference
  labels:
    app: vllm
spec:
  containers:
    - name: vllm
      image: vllm/vllm-openai:latest
      imagePullPolicy: Always
      command: ["/bin/bash", "-c"]
      args:
        - |
          set -exo pipefail
          echo "Starting vLLM with Llama-3-8B on H100 GPU..."
          python3 -m vllm.entrypoints.openai.api_server \
            --model NousResearch/Meta-Llama-3-8B \
            --tensor-parallel-size 1 \
            --host 0.0.0.0 \
            --port 8000 \
            --max-model-len 4096 \
            --trust-remote-code \
            --dtype float16
      env:
        - name: NCCL_NET_PLUGIN
          value: "libnccl-nonexistent.so"
      volumeMounts:
        - name: shared-memory
          mountPath: /dev/shm
      resources:
        limits:
          nvidia.com/gpu: 1
      ports:
        - containerPort: 8000
  nodeSelector:
    cloud.google.com/gke-accelerator: nvidia-h100-mega-80gb
  volumes:
    - name: shared-memory
      emptyDir:
        medium: "Memory"
        sizeLimit: 200Gi
