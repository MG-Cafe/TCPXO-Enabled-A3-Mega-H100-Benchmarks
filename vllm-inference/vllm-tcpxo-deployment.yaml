# vLLM Distributed Inference with GPUDirect-TCPXO on A3 Mega
# 2 nodes × 8 H100 GPUs = TP=16 with full TCPXO inter-node bandwidth (~188 GB/s)
#
# Key: Uses host NCCL 2.28.7 (via LD_PRELOAD) to match TCPXO shim version.
# vLLM bundles NCCL 2.27.5 which is incompatible with the shim.
# All NCCL_FASTRAK_* env vars from official nccl-test-latest.yaml are included.

apiVersion: v1
kind: Service
metadata:
  name: vllm-head
spec:
  selector:
    name: vllm-head
  clusterIP: None
  ports:
    - name: ray-client
      port: 10001
    - name: ray-dashboard
      port: 8265
    - name: ray-gcs
      port: 6379
    - name: vllm-api
      port: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-worker
spec:
  selector:
    name: vllm-worker
  clusterIP: None
---
apiVersion: v1
kind: Pod
metadata:
  name: vllm-head
  labels:
    name: vllm-head
    tcpxo: daemon
  annotations:
    devices.gke.io/container.tcpxo-daemon: |+
      - path: /dev/nvidia0
      - path: /dev/nvidia1
      - path: /dev/nvidia2
      - path: /dev/nvidia3
      - path: /dev/nvidia4
      - path: /dev/nvidia5
      - path: /dev/nvidia6
      - path: /dev/nvidia7
      - path: /dev/nvidiactl
      - path: /dev/nvidia-uvm
      - path: /dev/dmabuf_import_helper
    networking.gke.io/default-interface: 'eth0'
    networking.gke.io/interfaces: |
      [
        {"interfaceName":"eth0","network":"default"},
        {"interfaceName":"eth1","network":"vpc1"},
        {"interfaceName":"eth2","network":"vpc2"},
        {"interfaceName":"eth3","network":"vpc3"},
        {"interfaceName":"eth4","network":"vpc4"},
        {"interfaceName":"eth5","network":"vpc5"},
        {"interfaceName":"eth6","network":"vpc6"},
        {"interfaceName":"eth7","network":"vpc7"},
        {"interfaceName":"eth8","network":"vpc8"}
      ]
spec:
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
          - key: tcpxo
            operator: In
            values:
            - daemon
        topologyKey: "kubernetes.io/hostname"
  nodeSelector:
    cloud.google.com/gke-accelerator: nvidia-h100-mega-80gb
  containers:
    - name: tcpxo-daemon
      image: us-docker.pkg.dev/gce-ai-infra/gpudirect-tcpxo/tcpgpudmarxd-dev:v1.0.21
      imagePullPolicy: Always
      command: ["/bin/sh", "-c"]
      args:
        - |
          set -ex
          chmod 755 /fts/entrypoint_rxdm_container.sh
          /fts/entrypoint_rxdm_container.sh --num_hops=2 --num_nics=8
      securityContext:
        capabilities:
          add:
            - NET_ADMIN
            - NET_BIND_SERVICE
      volumeMounts:
        - name: nvidia
          mountPath: /usr/local/nvidia/lib64
        - name: sys
          mountPath: /hostsysfs
        - name: proc-sys
          mountPath: /hostprocsysfs
      env:
        - name: LD_LIBRARY_PATH
          value: /usr/local/nvidia/lib64
    - name: vllm
      image: vllm/vllm-openai:latest
      imagePullPolicy: Always
      command: ["/bin/bash", "-c"]
      args:
        - |
          set -ex

          # Install Ray for multi-node coordination
          pip install ray[default] 2>&1 | tail -3

          # Start Ray head node
          ray start --head --port=6379 --dashboard-host=0.0.0.0

          echo "Waiting for 2 Ray nodes (head + worker)..."
          for i in $(seq 1 120); do
            NODES=$(python3 -c "import ray; ray.init(address='auto'); print(len(ray.nodes()))" 2>/dev/null || echo "0")
            echo "Attempt $i: $NODES nodes connected"
            if [ "$NODES" -ge 2 ] 2>/dev/null; then break; fi
            sleep 10
          done
          echo "Ray cluster ready with $NODES nodes!"

          # Launch vLLM with TP=16 across 2 nodes (TCPXO for inter-node)
          python3 -m vllm.entrypoints.openai.api_server \
            --model NousResearch/Meta-Llama-3-8B \
            --tensor-parallel-size 16 \
            --distributed-executor-backend ray \
            --host 0.0.0.0 \
            --port 8000 \
            --max-model-len 4096 \
            --trust-remote-code \
            --dtype float16 \
            --enforce-eager 2>&1
      env:
        # Force host NCCL 2.28.7 (matches TCPXO shim) instead of vLLM's bundled 2.27.5
        - name: LD_PRELOAD
          value: /usr/local/nvidia/lib64/libnccl.so.2
        - name: LD_LIBRARY_PATH
          value: /usr/local/nvidia/lib64
        # Guest config checker config file (required by TCPXO shim)
        - name: NCCL_SHIMNET_GUEST_CONFIG_CHECKER_CONFIG_FILE
          value: /usr/local/nvidia/lib64/a3plus_guest_config.textproto
        # TCPXO FasTrak configuration — all ENFORCED vars from guest_config_checker
        - name: NCCL_FASTRAK_CTRL_DEV
          value: eth1,eth2,eth3,eth4,eth5,eth6,eth7,eth8
        - name: NCCL_FASTRAK_IFNAME
          value: eth1,eth2,eth3,eth4,eth5,eth6,eth7,eth8
        - name: NCCL_SOCKET_IFNAME
          value: eth0
        - name: NCCL_CROSS_NIC
          value: "0"
        - name: NCCL_PROTO
          value: "Simple,LL128"
        - name: NCCL_MIN_NCHANNELS
          value: "4"
        - name: NCCL_NVLSTREE_MAX_CHUNKSIZE
          value: "131072"
        - name: NCCL_P2P_NET_CHUNKSIZE
          value: "524288"
        - name: NCCL_P2P_PCI_CHUNKSIZE
          value: "524288"
        - name: NCCL_P2P_NVL_CHUNKSIZE
          value: "1048576"
        - name: NCCL_FASTRAK_NUM_FLOWS
          value: "2"
        - name: NCCL_FASTRAK_USE_SNAP
          value: "1"
        - name: NCCL_FASTRAK_ENABLE_CONTROL_CHANNEL
          value: "0"
        - name: NCCL_BUFFSIZE
          value: "8388608"
        - name: NCCL_NET_GDR_LEVEL
          value: PIX
        - name: NCCL_FASTRAK_ENABLE_HOTPATH_LOGGING
          value: "0"
        - name: NCCL_FASTRAK_USE_LLCM
          value: "1"
        - name: NCCL_FASTRAK_LLCM_DEVICE_DIRECTORY
          value: /dev/aperture_devices
        # Recommended by guest_config_checker
        - name: NCCL_TUNER_PLUGIN
          value: libnccl-tuner.so
        - name: NCCL_TUNER_CONFIG_PATH
          value: /usr/local/nvidia/lib64/a3plus_tuner_config.textproto
        - name: NCCL_FASTRAK_PLUGIN_ACCEPT_TIMEOUT_MS
          value: "600000"
        # vLLM / Ray settings
        - name: NCCL_DEBUG
          value: INFO
        - name: RAY_EXPERIMENTAL_NOSET_CUDA_VISIBLE_DEVICES
          value: "1"
        - name: VLLM_USE_V1
          value: "0"
      volumeMounts:
        - name: nvidia
          mountPath: /usr/local/nvidia/lib64
        - name: shared-memory
          mountPath: /dev/shm
        - name: aperture-devices
          mountPath: /dev/aperture_devices
        - name: model-cache
          mountPath: /root/.cache
      resources:
        limits:
          nvidia.com/gpu: 8
      ports:
        - containerPort: 8000
        - containerPort: 6379
        - containerPort: 8265
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
  volumes:
    - name: nvidia
      hostPath:
        path: /home/kubernetes/bin/nvidia/lib64
    - name: shared-memory
      emptyDir:
        medium: "Memory"
        sizeLimit: 200Gi
    - name: sys
      hostPath:
        path: /sys
    - name: proc-sys
      hostPath:
        path: /proc/sys
    - name: aperture-devices
      hostPath:
        path: /dev/aperture_devices
    - name: model-cache
      emptyDir: {}
---
