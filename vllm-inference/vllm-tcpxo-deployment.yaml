      command: ["/bin/bash", "-c"]
      args:
        - |
          set -ex
          pip install ray[default] 2>&1 | tail -3
          # Connect to Ray head node and block
          ray start --address=vllm-head:6379 --block
      env:
        - name: NCCL_NET_PLUGIN
          value: libnccl-nonexistent.so
        - name: NCCL_TUNER_PLUGIN
          value: libnccl-tuner-nonexistent.so
        - name: NCCL_SOCKET_IFNAME
          value: eth0
        - name: NCCL_DEBUG
          value: INFO
        - name: RAY_EXPERIMENTAL_NOSET_CUDA_VISIBLE_DEVICES
          value: "1"
      volumeMounts:
        - name: shared-memory
          mountPath: /dev/shm
        - name: model-cache
          mountPath: /root/.cache
      resources:
        limits:
          nvidia.com/gpu: 8
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
  volumes:
    - name: nvidia
      hostPath:
        path: /home/kubernetes/bin/nvidia/lib64
    - name: shared-memory
